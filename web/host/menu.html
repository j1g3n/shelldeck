<style>
    .h-navbar {
        height: 50px;
        background-color: #161b22;
        border-bottom: 1px solid #30363d;

    .h-brand {

    .h-nav-items { display: flex; align-items: center; gap: 5px; flex: 1; }

    .h-nav-btn {

        color: #238636;
        font-weight: bold;
    }

    .h-dropdown-wrapper { position: relative; }

    .h-dropdown-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 5px;
        background-color: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        min-width: 160px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        z-index: 999;
        flex-direction: column;
        padding: 5px;
    }

    .h-dropdown-wrapper.open .h-dropdown-menu { display: flex; }
    .h-dropdown-wrapper.open .h-nav-btn { color: #fff; background: #21262d; }

    .h-drop-item {
        padding: 8px 10px;
        color: #c9d1d9;
        cursor: pointer;
        border-radius: 4px;
        display: flex; align-items: center; gap: 8px;

    }
    .h-drop-item:hover { background-color: #0d1117; color: #58a6ff; }
    .h-drop-item i { width: 20px; text-align: center; opacity: 0.7; }

    /* Nested Menu */
    .h-drop-item { position: relative; }
    .h-submenu { display: none; position: absolute; left: 100%; top: -5px; background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; min-width: 160px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-direction: column; padding: 5px; z-index: 1000; }

    .caret { font-size: 0.7em; margin-left: 5px; opacity: 0.5; }
    
    /* Modal Styles for Menu */
    .menu-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; }
    .menu-modal-row { display: flex; flex-direction: column; gap: 5px; }
    .menu-modal-row label { font-size: 0.8em; color: #8b949e; }
    .menu-modal-row input, .menu-modal-row select { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 4px; }
    .menu-modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
    .menu-btn { background: #238636; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .menu-btn-sec { background: transparent; border: 1px solid #30363d; color: #c9d1d9; }
    
    /* Terminal Modal specific */
    .menu-term-box { width: 50vw; height: 50vh; padding: 0; overflow: hidden; display: flex; flex-direction: column; background: #000; border: 1px solid #555; position: relative; }

</style>

<script>
    (function(appInstance) {
        const app = appInstance;
        if(!app) return; // Sicurezza

        // SCOPED QUERY: Cerchiamo SOLO dentro il container di questo host
        const root = app.container.querySelector('.menu-root');
        const titleEl = app.container.querySelector('.menu-host-title');

        if(titleEl) {
            titleEl.innerText = app.hostName.toUpperCase();
        }

        // --- SCRIPT MENU LOGIC ---
        let scriptWs = null;
        let currentScriptPath = "";
        const scriptMenuRoot = root.querySelector('#scripts-menu-root');
        const execModal = app.container.querySelector('#menu-exec-modal');
        const termModal = app.container.querySelector('#menu-term-modal');
        
        let term = null;
        let fitAddon = null;
        let currentTermId = null;
        let pendingMenuPayload = null;

        const loadScript = (src) => new Promise((resolve) => {
            if (document.querySelector(`script[src="${src}"]`)) return resolve();
            const s = document.createElement('script'); s.src = src; s.onload = resolve; document.head.appendChild(s);
        });

        async function loadScripts() {
            try {
                const res = await fetch('/api/scripts/tree');
                if(res.ok) {
                    const tree = await res.json();
                    renderScriptMenu(tree);
                }
            } catch(e) { console.error("Error loading scripts", e); }
        }
        
        // Esponi funzione di refresh globale per la pagina script.html
        app.refreshScriptMenu = loadScripts;

        function renderScriptMenu(items) {
            if(!scriptMenuRoot) return;
            // Keep the first two elements (Manage link and separator)
            const staticItems = Array.from(scriptMenuRoot.children).slice(0, 2);
            scriptMenuRoot.innerHTML = "";
            staticItems.forEach(el => scriptMenuRoot.appendChild(el));

            if(!items || items.length === 0) {
                const empty = document.createElement('div');
                empty.style.padding = "5px 10px"; empty.style.color = "#8b949e"; empty.style.fontSize = "0.8em";
                empty.innerText = "No scripts found";
                scriptMenuRoot.appendChild(empty);
                return;
            }

            // Sort: folders first
            items.sort((a, b) => (a.type === b.type ? 0 : a.type === 'dir' ? -1 : 1));

            items.forEach(item => {
                scriptMenuRoot.appendChild(createMenuItem(item));
            });
        }

        function createMenuItem(item) {
            const div = document.createElement('div');
            div.className = "h-drop-item";
            
            if(item.type === 'dir') {
                div.innerHTML = `<i class="fas fa-folder" style="color:#e3b341"></i> ${item.name} <i class="fas fa-chevron-right"></i>`;
                const submenu = document.createElement('div');
                submenu.className = "h-submenu";
                if(item.children) {
                    item.children.sort((a, b) => (a.type === b.type ? 0 : a.type === 'dir' ? -1 : 1));
                    item.children.forEach(child => submenu.appendChild(createMenuItem(child)));
                } else {
                    submenu.innerHTML = "<div style='padding:5px;color:#666;font-size:0.8em'>(empty)</div>";
                }
                div.appendChild(submenu);
            } else {
                div.innerHTML = `<i class="fas fa-file-code" style="color:#58a6ff"></i> ${item.name}`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    // Force close dropdowns immediately
                    root.querySelectorAll('.h-dropdown-wrapper').forEach(w => w.classList.remove('open'));
                    openExecModal(item.path);
                };
            }
            return div;
        }

        function openExecModal(path) {
            if(!execModal) return console.error("Exec modal not found");
            currentScriptPath = path;
            execModal.style.display = 'flex';
            // Reset fields
            execModal.querySelector('#menu-exec-mode').value = 'runtime';
            execModal.querySelector('#menu-exec-mode').dispatchEvent(new Event('change'));
        }

        // Modal Events
        if(execModal) {
            const modeSel = execModal.querySelector('#menu-exec-mode');
            modeSel.onchange = () => {
                const val = modeSel.value;
                execModal.querySelector('#menu-runtime-opts').style.display = (val === 'runtime' || val === 'drop' || val === 'ram') ? 'block' : 'none';
                execModal.querySelector('#menu-row-drop-path').style.display = val === 'drop' ? 'flex' : 'none';
                execModal.querySelector('#menu-row-cron-sched').style.display = val === 'cron' ? 'flex' : 'none';
                execModal.querySelector('#menu-systemd-opts').style.display = val === 'systemd' ? 'block' : 'none';
                
                // Hide screen option for RAM mode
                execModal.querySelector('#menu-lbl-screen').style.display = (val === 'ram' || val === 'drop') ? 'none' : 'flex';

                // Auto-fill drop path if visible
                if(val === 'drop') {
                    const explorerInput = document.querySelector('.current-path-input');
                    if(explorerInput && explorerInput.offsetParent !== null) {
                        execModal.querySelector('#menu-exec-path').value = explorerInput.value;
                    }
                }
            };
            
            execModal.querySelector('#menu-exec-screen').onchange = (e) => {
                execModal.querySelector('#menu-row-screen-label').style.display = e.target.checked ? 'flex' : 'none';
            };
            
            execModal.querySelector('#menu-sysd-type').onchange = (e) => {
                execModal.querySelector('#menu-row-sysd-sched').style.display = e.target.value === 'timer' ? 'flex' : 'none';
            };

            execModal.querySelector('#btn-menu-cancel').onclick = () => execModal.style.display = 'none';
            
            execModal.querySelector('#btn-menu-confirm').onclick = () => {
                const mode = modeSel.value;
                const targetPath = execModal.querySelector('#menu-exec-path').value;
                const schedule = execModal.querySelector('#menu-exec-schedule').value;
                const runAsUser = execModal.querySelector('#menu-exec-root').checked ? 'root' : 'user';
                const useScreen = execModal.querySelector('#menu-exec-screen').checked;
                const screenLabel = execModal.querySelector('#menu-exec-screen-label').value;
                const cronAsRoot = execModal.querySelector('#menu-cron-root').checked;
                
                // Systemd vars
                const sysdType = execModal.querySelector('#menu-sysd-type').value;
                const sysdName = execModal.querySelector('#menu-sysd-name').value;
                const sysdSched = execModal.querySelector('#menu-sysd-schedule').value;
                const sysdRoot = execModal.querySelector('#menu-sysd-root').checked;

                if(mode === 'cron' && !schedule) return alert("Schedule richiesta");
                if(mode === 'systemd' && !sysdName) return alert("Nome servizio richiesto");
                if(mode === 'systemd' && sysdType === 'timer' && !sysdSched) return alert("Schedule richiesta per Timer");

                // Init WS if needed
                if(!scriptWs || scriptWs.readyState !== WebSocket.OPEN) {
                    initWs(() => sendScriptCmd(mode, targetPath, schedule, runAsUser, useScreen, screenLabel, cronAsRoot, sysdType, sysdName, sysdSched, sysdRoot));
                } else {
                    sendScriptCmd(mode, targetPath, schedule, runAsUser, useScreen, screenLabel, cronAsRoot, sysdType, sysdName, sysdSched, sysdRoot);
                }
                execModal.style.display = 'none';
            };
        }
        
        if(termModal) {
            termModal.querySelector('#btn-menu-term-close').onclick = () => {
                termModal.style.display = 'none';
                if(term) term.dispose();
                term = null;
                if(scriptWs && currentTermId) scriptWs.send(JSON.stringify({ type: "ssh_close", host_id: parseInt(app.hostId), term_id: currentTermId }));
            };
            termModal.querySelector('#btn-menu-detach').onclick = () => {
                if(scriptWs && currentTermId) {
                    // Send Ctrl+A (0x01) then 'd'
                    scriptWs.send(JSON.stringify({ type: "ssh_input", host_id: parseInt(app.hostId), term_id: currentTermId, payload: "\x01d" }));
                    setTimeout(() => termModal.style.display = 'none', 500);
                }
            };
        }

        function initWs(cb) {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            scriptWs = new WebSocket(`${protocol}//${window.location.host}/ws/client`);
            scriptWs.onopen = cb;
            scriptWs.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if(msg.type === "ssh_output" && msg.term_id === currentTermId) {
                    if(term) term.write(msg.payload);
                }
                if(msg.type === "script_output") {
                    // For non-interactive runtime output (fallback)
                    if(term) term.write(msg.payload.output);
                    else alert("Output:\n" + msg.payload.output);
                }
                if(msg.type === "script_op_res") {
                    alert(msg.payload.status === "success" ? "Successo: " + (msg.payload.msg || "OK") : "Errore: " + msg.payload.msg);
                }
                if (msg.type === "script_upload_ack") {
                    if(msg.payload.status === "success") {
                        if(pendingMenuPayload) {
                            pendingMenuPayload.filename = msg.payload.remote_file;
                            startMenuExecution(pendingMenuPayload);
                        }
                    } else {
                        alert("Upload failed: " + msg.payload.msg);
                    }
                }
            };
        }

        async function sendScriptCmd(mode, targetPath, schedule, runAsUser, useScreen, screenLabel, cronAsRoot, sysdType, sysdName, sysdSched, sysdRoot) {
            // Use a temp term ID for this execution
            currentTermId = `${app.workspaceId || 0}:menu_script_` + Math.random().toString(36).substring(2, 9);

            if(mode === 'runtime' || mode === 'ram') { 
                // Carica JS solo se necessario (CSS è già nel head)
                if(typeof Terminal === 'undefined') await loadScript('/lib/js/xterm.js'); 
                if(typeof FitAddon === 'undefined') await loadScript('/lib/js/xterm-addon-fit.js'); 
            }

            // Determine interpreter based on extension
            let interpreter = "bash";
            if(currentScriptPath.endsWith('.py')) interpreter = "python3";
            else if(currentScriptPath.endsWith('.js')) interpreter = "node";

            // Subscribe to receive output
            scriptWs.send(JSON.stringify({ type: "subscribe", host_id: parseInt(app.hostId), term_id: currentTermId }));

            pendingMenuPayload = {
                mode: mode,
                target_path: targetPath,
                schedule: (mode === 'systemd' ? sysdSched : schedule),
                interactive: true,
                interpreter: interpreter,
                run_as_user: runAsUser,
                use_screen: useScreen,
                screen_label: screenLabel,
                cron_as_root: (mode === 'systemd' ? sysdRoot : cronAsRoot),
                sysd_type: sysdType,
                sysd_name: sysdName
            };

            // Step 1: Upload
            scriptWs.send(JSON.stringify({
                type: "script_exec_req",
                host_id: parseInt(app.hostId),
                term_id: currentTermId,
                payload: { script_path: currentScriptPath }
            }));
        }
        
        function startMenuExecution(payload) {
            if(payload.mode === 'runtime' || payload.mode === 'ram') {
                openTerminal();
            }
            pendingMenuPayload = null; // Pulisci il payload per evitare esecuzioni fantasma su ACK broadcast
            scriptWs.send(JSON.stringify({ type: "script_run_req", host_id: parseInt(app.hostId), term_id: currentTermId, payload: payload }));
        }
        
        function openTerminal() {
            termModal.style.display = 'flex';
            const embed = termModal.querySelector('#menu-term-embed');
            embed.innerHTML = "";
            if(typeof Terminal !== 'undefined') {
                term = new Terminal({ cursorBlink: true, fontSize: 13, theme: { background: '#000' } });
                fitAddon = new FitAddon.FitAddon();
                term.loadAddon(fitAddon);
                term.open(embed);
                fitAddon.fit();
                term.onData(d => scriptWs.send(JSON.stringify({ type: "ssh_input", host_id: parseInt(app.hostId), term_id: currentTermId, payload: d })));
                setTimeout(() => { 
                    fitAddon.fit(); 
                    scriptWs.send(JSON.stringify({ type: "ssh_resize", host_id: parseInt(app.hostId), term_id: currentTermId, payload: { cols: term.cols, rows: term.rows } }));
                    term.focus();
                    // Removed auto-enter to prevent accidental script input/exit
                }, 300);
            }
        }

        loadScripts();

        // GESTIONE CLICK MENU (Scoped su root)
        root.addEventListener('click', (e) => {
            // Dropdown
            const trigger = e.target.closest('.dropdown-trigger');
            if(trigger) {
                const wrapper = trigger.closest('.h-dropdown-wrapper');
                root.querySelectorAll('.h-dropdown-wrapper').forEach(w => {
                    if(w !== wrapper) w.classList.remove('open');
                });
                wrapper.classList.toggle('open');
                e.stopPropagation();
                return;
            }

            // Navigazione
            const btn = e.target.closest('[data-target]');
            if(btn) {
                const page = btn.dataset.target;
                const mode = btn.dataset.mode || null;

                // UI Active State
                root.querySelectorAll('.h-nav-btn').forEach(b => b.classList.remove('active', 'force-active'));
                
                const parentDrop = btn.closest('.h-dropdown-wrapper');
                if(parentDrop) {
                    parentDrop.querySelector('.dropdown-trigger').classList.add('force-active');
                    parentDrop.classList.remove('open');
                } else {
                    btn.classList.add('active');
                }

                // Chiama la funzione sull'istanza corretta
                app.loadPage(page, null, mode);
            }
        });

        // Chiudi dropdown se clicco fuori (Listener globale ma gestito)
        const closeDropdowns = (e) => {
            // Se il click non è dentro QUESTO menu, chiudi i dropdown di QUESTO menu
            if(!root.contains(e.target)) {
                root.querySelectorAll('.h-dropdown-wrapper').forEach(w => w.classList.remove('open'));
            }
        };

        document.addEventListener('click', closeDropdowns);

        // NOTA: Non registriamo cleanup qui perché il menu deve persistere tra le navigazioni delle pagine (loadPage).
        // Il cleanup di loadPage cancellerebbe le modali e il WS del menu, rompendolo.
        // Idealmente HostApp dovrebbe avere un cleanup "globale" vs "pagina", ma per ora lasciamo il menu vivo
        // finché l'intera HostApp non viene distrutta (chiusura tab browser).

    })(arguments[0]);
</script>
