<style>
    .mgr-container { padding: 20px; height: 100%; display: flex; flex-direction: column; color: #e6edf3; }
    .mgr-header { font-size: 1.5em; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .mgr-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .mgr-tab { padding: 8px 16px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; color: #8b949e; }
    .mgr-tab.active { background: #238636; color: white; border-color: #238636; }
    .mgr-content { flex: 1; overflow-y: auto; display: none; }
    .mgr-content.active { display: block; }
    
    .mgr-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .mgr-table th { text-align: left; padding: 10px; background: #161b22; border-bottom: 1px solid #30363d; color: #8b949e; }
    .mgr-table td { padding: 10px; border-bottom: 1px solid #30363d; }
    .mgr-table tr:hover { background: #1c2128; }
    
    .mgr-btn { padding: 4px 8px; border-radius: 4px; border: 1px solid #30363d; background: #21262d; color: #e6edf3; cursor: pointer; font-size: 0.85em; }
    .mgr-btn:hover { background: #30363d; }
    .mgr-btn-danger { color: #da3633; border-color: #da3633; }
    .mgr-btn-danger:hover { background: rgba(218, 54, 51, 0.1); }
    
    .mgr-form { background: #161b22; padding: 15px; border-radius: 6px; border: 1px solid #30363d; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-end; }
    .mgr-input-grp { display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .mgr-input-grp label { font-size: 0.8em; color: #8b949e; }
    .mgr-input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 6px; border-radius: 4px; }
    
    .mgr-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10; }
    .mgr-modal-content { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 8px; width: 500px; max-height: 80%; overflow-y: auto; }
    .mgr-modal-header { font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; display: flex; justify-content: space-between; }
    
    .assign-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #30363d; align-items: center; }
    .assign-row:hover { background: #21262d; }
    
    .key-display { font-family: monospace; font-size: 0.85em; background: #0d1117; padding: 2px 5px; border-radius: 3px; border: 1px solid #30363d; display: none; }
</style>

<div class="mgr-container">
    <div class="mgr-header">
        <span><i class="fas fa-cogs"></i> System Manager</span>
        <span style="font-size:0.6em; color:#8b949e" id="mgr-user-info"></span>
    </div>

    <div class="mgr-tabs">
        <div class="mgr-tab active" onclick="window.Mgr.switchTab('users')">Users</div>
        <div class="mgr-tab" onclick="window.Mgr.switchTab('groups')">Databases / Workspaces</div>
        <div class="mgr-tab" id="tab-btn-config" style="display:none" onclick="window.Mgr.switchTab('config')">Server Config</div>
    </div>

    <!-- USERS TAB -->
    <div id="tab-users" class="mgr-content active">
        <div class="mgr-form" id="user-form">
            <div class="mgr-input-grp"><label>Username</label><input type="text" id="new-user-name" class="mgr-input"></div>
            <div class="mgr-input-grp"><label>Password</label><input type="password" id="new-user-pass" class="mgr-input"></div>
            <div class="mgr-input-grp" id="grp-global-admin" style="flex:0"><label>Global Admin</label><input type="checkbox" id="new-user-global"></div>
            <button class="mgr-btn" style="background:#238636; border-color:#238636" onclick="window.Mgr.createUser()">Create User</button>
        </div>
        <table class="mgr-table">
            <thead><tr><th>ID</th><th>Username</th><th>Global Admin</th><th>Actions</th></tr></thead>
            <tbody id="users-list"></tbody>
        </table>
    </div>

    <!-- GROUPS TAB -->
    <div id="tab-groups" class="mgr-content">
        <!-- Global Admin Only Actions -->
        <div id="global-admin-actions" style="display:none; gap:20px; margin-bottom:20px;">
            <div class="mgr-form" style="flex:1; margin-bottom:0">
                <h4 style="width:100%; margin:0 0 10px 0; font-size:0.9em; color:#8b949e">Create New Workspace</h4>
                <div class="mgr-input-grp"><label>Name</label><input type="text" id="new-group-name" class="mgr-input"></div>
                <button class="mgr-btn" style="background:#238636; border-color:#238636" onclick="window.Mgr.createGroup()">Create New</button>
            </div>
            
            <div class="mgr-form" style="flex:1; margin-bottom:0; border-color:#8957e5">
                <h4 style="width:100%; margin:0 0 10px 0; font-size:0.9em; color:#8957e5">Upload Workspace (.db)</h4>
                <div class="mgr-input-grp"><label>Name</label><input type="text" id="up-group-name" class="mgr-input"></div>
                <div class="mgr-input-grp"><label>Key</label><input type="password" id="up-group-key" class="mgr-input"></div>
                <div class="mgr-input-grp"><label>File</label><input type="file" id="up-group-file" class="mgr-input" accept=".db"></div>
                <button class="mgr-btn" style="border-color:#8957e5; color:#8957e5" onclick="window.Mgr.uploadGroup()">Upload</button>
            </div>
        </div>
        
        <table class="mgr-table">
            <thead><tr><th>ID</th><th>Name</th><th>DB Path</th><th>Encryption Key</th><th>Actions</th></tr></thead>
            <tbody id="groups-list"></tbody>
        </table>
    </div>

    <!-- CONFIG TAB -->
    <div id="tab-config" class="mgr-content">
        <div class="mgr-form">
            <div class="mgr-input-grp"><label>Listen Address (Port)</label><input type="text" id="cfg-listen-addr" class="mgr-input" placeholder=":9012"></div>
            <button class="mgr-btn" style="background:#238636; border-color:#238636" onclick="window.Mgr.saveConfig()">Save & Restart</button>
        </div>
    </div>

    <!-- ASSIGNMENT MODAL -->
    <div id="assign-modal" class="mgr-modal">
        <div class="mgr-modal-content">
            <div class="mgr-modal-header">
                <span id="assign-modal-title">Assign Workspaces</span>
                <i class="fas fa-times" style="cursor:pointer" onclick="document.getElementById('assign-modal').style.display='none'"></i>
            </div>
            <div style="margin-bottom:10px; font-size:0.8em; color:#8b949e">Check to assign user to workspace.</div>
            <div id="assign-list"></div>
        </div>
    </div>
</div>

<script>
    window.Mgr = {
        currentUser: null,
        allGroups: [],

        init: function() {
            this.currentUser = window.AppState.currentUser;
            const isGlobal = this.currentUser.is_global_admin;
            
            document.getElementById('mgr-user-info').innerText = `Logged as: ${this.currentUser.username} (${isGlobal ? 'Global Admin' : 'Group Admin'})`;
            
            if(isGlobal) {
                document.getElementById('global-admin-actions').style.display = 'flex';
                document.getElementById('tab-btn-config').style.display = 'block';
            } else {
                document.getElementById('grp-global-admin').style.display = 'none';
            }

            this.loadUsers();
            this.loadGroups();
            if(isGlobal) this.loadConfig();
        },

        switchTab: function(tab) {
            document.querySelectorAll('.mgr-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.mgr-content').forEach(c => c.classList.remove('active'));
            
            // Trova l'elemento cliccato (un po' hacky ma veloce)
            const tabs = document.querySelectorAll('.mgr-tab');
            if(tab === 'users') tabs[0].classList.add('active');
            else if(tab === 'groups') tabs[1].classList.add('active');
            else if(tab === 'config') tabs[2].classList.add('active');
            
            document.getElementById('tab-'+tab).classList.add('active');
        },

        // --- USERS ---
        loadUsers: async function() {
            try { // Il try/catch è ancora utile perché apiFetch lancia un errore in caso di 401/403
                const res = await window.apiFetch('/api/admin/users');
                const users = await res.json() || [];
                if (!Array.isArray(users)) return;
                const tbody = document.getElementById('users-list');
                tbody.innerHTML = '';
                users.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.id}</td>
                            <td>${u.username}</td>
                            <td>${u.is_global_admin ? '<span style="color:#238636">Yes</span>' : 'No'}</td>
                            <td>
                                <button class="mgr-btn" onclick="window.Mgr.openAssignModal(${u.id}, '${u.username}')"><i class="fas fa-link"></i> Assign</button>
                                <button class="mgr-btn" onclick="window.Mgr.resetPass(${u.id})"><i class="fas fa-key"></i> Pass</button>
                                ${this.currentUser.is_global_admin ? `<button class="mgr-btn mgr-btn-danger" onclick="window.Mgr.deleteUser(${u.id})"><i class="fas fa-trash"></i></button>` : ''}
                            </td>
                        </tr>`;
                });
            } catch(e) { console.error(e); }
        },

        createUser: async function() {
            const name = document.getElementById('new-user-name').value;
            const pass = document.getElementById('new-user-pass').value;
            const global = document.getElementById('new-user-global').checked;
            if(!name || !pass) return alert("Fill all fields");
            
            await window.apiFetch('/api/admin/users', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ username: name, password: pass, is_global_admin: global })
            });
            this.loadUsers();
            document.getElementById('new-user-name').value = '';
            document.getElementById('new-user-pass').value = '';
        },

        deleteUser: async function(id) {
            if(!confirm("Delete user?")) return;
            await window.apiFetch('/api/admin/users/'+id, { method: 'DELETE' });
            this.loadUsers();
        },

        resetPass: async function(id) {
            const newPass = prompt("Enter new password:");
            if(!newPass) return;
            await window.apiFetch('/api/admin/users/'+id, {
                method: 'PUT', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ password: newPass })
            });
            alert("Password updated");
        },

        // --- GROUPS ---
        loadGroups: async function() {
            try {
                const res = await window.apiFetch(`/api/admin/groups?user_id=${this.currentUser.id}`);
                this.allGroups = await res.json() || [];
                if (!Array.isArray(this.allGroups)) this.allGroups = [];
                const tbody = document.getElementById('groups-list');
                tbody.innerHTML = '';
                
                const isGlobal = this.currentUser.is_global_admin;

                this.allGroups.forEach(g => {
                    const deleteBtn = isGlobal ? `<button class="mgr-btn mgr-btn-danger" onclick="window.Mgr.deleteGroup(${g.id})"><i class="fas fa-trash"></i></button>` : '';
                    const cloneBtn = isGlobal ? `<button class="mgr-btn" onclick="window.Mgr.cloneGroup(${g.id})">Clone</button>` : '';

                    tbody.innerHTML += `
                        <tr>
                            <td>${g.id}</td>
                            <td>${g.name}</td>
                            <td style="font-family:monospace; font-size:0.8em; color:#8b949e">${g.db_path}</td>
                            <td>
                                <button class="mgr-btn" style="font-size:0.7em" onclick="this.nextElementSibling.style.display='inline-block'; this.style.display='none'">Show Key</button>
                                <span class="key-display" onclick="navigator.clipboard.writeText(this.innerText); alert('Copied!')" title="Click to copy">${g.encryption_key}</span>
                            </td>
                            <td>
                                ${cloneBtn}
                                ${deleteBtn}
                            </td>
                        </tr>`;
                });
            } catch(e) { console.error(e); }
        },

        createGroup: async function() {
            const name = document.getElementById('new-group-name').value;
            if(!name) return;
            await window.apiFetch('/api/admin/groups', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ name: name })
            });
            this.loadGroups();
            document.getElementById('new-group-name').value = '';
        },

        uploadGroup: async function() {
            const name = document.getElementById('up-group-name').value;
            const key = document.getElementById('up-group-key').value;
            const fileInput = document.getElementById('up-group-file');
            
            if(!name || !key || fileInput.files.length === 0) return alert("All fields required");

            const formData = new FormData();
            formData.append("name", name);
            formData.append("key", key);
            formData.append("db_file", fileInput.files[0]);

            const res = await window.apiFetch('/api/admin/workspace/upload', {
                method: 'POST',
                body: formData
            });

            if(res.ok) {
                alert("Workspace uploaded successfully!");
                this.loadGroups();
                document.getElementById('up-group-name').value = '';
                document.getElementById('up-group-key').value = '';
                fileInput.value = '';
            } else {
                alert("Upload failed: " + await res.text());
            }
        },

        deleteGroup: async function(id) {
            if(!confirm("Delete workspace registry?")) return;
            await window.apiFetch('/api/admin/groups/'+id, { method: 'DELETE' });
            this.loadGroups();
        },

        cloneGroup: async function(id) {
            const newName = prompt("Name for the cloned workspace:");
            if(!newName) return;
            await window.apiFetch(`/api/admin/groups/${id}/clone`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ new_name: newName })
            });
            this.loadGroups();
        },

        // --- ASSIGNMENTS ---
        openAssignModal: async function(userId, username) {
            document.getElementById('assign-modal-title').innerText = "Assign Workspaces: " + username;
            document.getElementById('assign-modal').style.display = 'flex';
            const list = document.getElementById('assign-list');
            list.innerHTML = '<div style="text-align:center"><i class="fas fa-circle-notch fa-spin"></i></div>';

            const res = await window.apiFetch('/api/admin/assignments/user/'+userId);
            const currentAssigns = await res.json() || [];
            if (!Array.isArray(currentAssigns)) return;
            const assignedMap = {}; 
            currentAssigns.forEach(a => assignedMap[a.group_id] = a.is_group_admin);

            list.innerHTML = '';
            this.allGroups.forEach(g => {
                const isAssigned = assignedMap.hasOwnProperty(g.id);
                const isAdmin = assignedMap[g.id] === true;
                
                list.innerHTML += `
                    <div class="assign-row">
                        <div style="display:flex; flex-direction:column">
                            <span style="font-weight:bold">${g.name}</span>
                            <span style="font-size:0.7em; color:#8b949e">ID: ${g.id}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:15px">
                            <label style="font-size:0.8em; display:flex; align-items:center; gap:5px">
                                <input type="checkbox" ${isAssigned ? 'checked' : ''} onchange="window.Mgr.toggleAssign(${userId}, ${g.id}, this.checked, document.getElementById('admin-chk-${g.id}').checked)">
                                Access
                            </label>
                            <label style="font-size:0.8em; display:flex; align-items:center; gap:5px">
                                <input type="checkbox" id="admin-chk-${g.id}" ${isAdmin ? 'checked' : ''} ${!isAssigned ? 'disabled' : ''} onchange="window.Mgr.toggleAssign(${userId}, ${g.id}, true, this.checked)">
                                Group Admin
                            </label>
                        </div>
                    </div>`;
            });
        },

        toggleAssign: async function(userId, groupId, access, isAdmin) {
            const adminChk = document.getElementById(`admin-chk-${groupId}`);
            if(adminChk) adminChk.disabled = !access;

            if(access) {
                await window.apiFetch('/api/admin/assignments', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ user_id: userId, group_id: groupId, is_group_admin: isAdmin })
                });
            } else {
                await window.apiFetch('/api/admin/assignments', {
                    method: 'DELETE', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ user_id: userId, group_id: groupId })
                });
                if(adminChk) adminChk.checked = false;
            }
        },

        // --- CONFIG ---
        loadConfig: async function() {
            try {
                const res = await window.apiFetch('/api/admin/config');
                if(res.ok) {
                    const cfg = await res.json();
                    document.getElementById('cfg-listen-addr').value = cfg.listen_address;
                }
            } catch(e) { console.error(e); }
        },

        saveConfig: async function() {
            const addr = document.getElementById('cfg-listen-addr').value;
            if(!addr) return alert("Address required");
            if(!confirm("Changing the port will restart the server. Continue?")) return;
            
            await window.apiFetch('/api/admin/config', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ listen_address: addr })
            });
            alert("Configuration saved. Server is restarting...");
            setTimeout(() => window.location.reload(), 2000);
        }
    };

    window.Mgr.init();
</script>
