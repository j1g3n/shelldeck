<style>
    .top-bar {
        height: 60px; padding: 0 20px; display: flex; align-items: center;
        border-bottom: 1px solid var(--border); background: var(--bg-panel);
    }
    .breadcrumb { 
        font-size: 1.1em; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; 
        overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1;
    }
    .breadcrumb-link { cursor: pointer; text-decoration: none; color: var(--text-secondary); transition: 0.2s; }
    .breadcrumb-link:hover { color: var(--text-accent); }
    .badge-proto { 
        background: #21262d; padding: 2px 6px; border-radius: 4px; font-size: 0.6em; 
        border: 1px solid var(--border); color: var(--text-accent); margin-left: 10px;
    }
</style>

<div class="top-bar">
    <div class="breadcrumb" id="breadcrumb">
        <i class="fas fa-network-wired"></i> 
        <a href="#" class="breadcrumb-link" onclick="window.selectGroup(null)">SYSTEM</a> 
        <span id="bread-path"></span> 
        <span class="badge-proto" id="badge-proto">ALL</span>
    </div>
</div>

<script>
    window.updateBreadcrumb = function(id) {
        const el = document.getElementById('bread-path');
        if(id === null) { el.innerHTML = ' / <span>ALL</span>'; return; }
        const g = window.AppState.allGroups.find(x => x.id === id);
        el.innerHTML = g ? ` / <span>${g.name}</span>` : '';
    }
</script>
